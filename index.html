<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Tone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #111;
  --paper: #f5f3ee;
  --rule: #d8d5ce;
  --muted: #999;
  --mono: 'DM Mono', monospace;
  --serif: 'Instrument Serif', serif;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 13px;
  height: 100vh;
  display: grid;
  grid-template-columns: 300px 1fr;
  grid-template-rows: 56px 1fr;
  overflow: hidden;
}

header {
  grid-column: 1 / -1;
  border-bottom: 1px solid var(--rule);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo { font-family: var(--serif); font-size: 20px; font-style: italic; }
.logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

aside {
  border-right: 1px solid var(--rule);
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  overflow-y: auto;
}

label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}

textarea {
  width: 100%;
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink);
  resize: none;
  line-height: 1.6;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: var(--ink); }
textarea::placeholder { color: var(--muted); }

.run {
  width: 100%;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 3px;
  padding: 13px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s;
  margin-top: auto;
}
.run:hover { opacity: 0.8; }

.keywords-list {
  font-size: 10px;
  color: var(--muted);
  line-height: 2;
  column-count: 2;
}

main {
  overflow-y: auto;
  padding: 24px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
  min-height: 28px;
}

.tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--rule);
  color: var(--muted);
}

.tag.matched {
  color: #fff;
  border-color: transparent;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.card {
  border: 1px solid var(--rule);
  border-radius: 3px;
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-preview {
  height: 140px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
}

.preview-main {
  grid-column: 1;
  grid-row: 1 / 3;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
}

.preview-top { grid-column: 2; grid-row: 1; }

.preview-bot {
  grid-column: 2;
  grid-row: 2;
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 5px;
}

.swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
}

.card-body {
  padding: 14px 16px;
  background: var(--paper);
  border-top: 1px solid var(--rule);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-tag {
  font-size: 10px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
}

.reroll {
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 4px 8px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
}
.reroll:hover { border-color: var(--ink); color: var(--ink); }

.swatches-row {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.1);
  cursor: default;
  position: relative;
}

.meta-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}

.css-block {
  background: #eeebe3;
  border-radius: 3px;
  padding: 10px 12px;
  font-size: 10px;
  line-height: 1.9;
  white-space: pre;
  overflow-x: auto;
}

.ck { color: #bbb; }
.cv { color: var(--ink); }

.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  gap: 8px;
  color: var(--muted);
}
.empty-arrow { font-family: var(--serif); font-size: 48px; font-style: italic; opacity: 0.15; }
.empty-text { font-size: 11px; letter-spacing: 0.06em; }
</style>
</head>
<body>

<header>
  <span class="logo">Visual Tone</span>
  <span class="logo-sub">Keyword Style Generator</span>
</header>

<aside>
  <div>
    <label>Concept</label>
    <textarea id="concept" rows="5" placeholder="cold war space race&#10;late night neon&#10;dry desert heat&#10;soviet brutalist&#10;tokyo jazz bar"></textarea>
  </div>

  <div>
    <label>Keywords</label>
    <div class="keywords-list" id="kwList"></div>
  </div>

  <button class="run" id="runBtn">Generate →</button>
</aside>

<main>
  <div class="tags" id="tags"></div>
  <div id="output">
    <div class="empty">
      <div class="empty-arrow">↗</div>
      <div class="empty-text">Enter a concept and click Generate</div>
    </div>
  </div>
</main>

  whiskey:     { hues:[28,38,48],             sat:[55,80],  lit:[40,60],  label:'whiskey amber' },
  // music genres
  classical:   { hues:[38,48,200,210],        sat:[15,35],  lit:[50,75],  label:'classical gold' },
  hiphop:      { hues:[0,15,220,235],         sat:[40,70],  lit:[15,40],  label:'hip hop contrast' },
  metal:       { hues:[220,235,0,10],         sat:[10,30],  lit:[5,25],   label:'metal black' },
  folk:        { hues:[30,45,80,95],          sat:[25,50],  lit:[40,65],  label:'folk earth' },
  electronic:  { hues:[190,210,280,300],      sat:[70,100], lit:[40,65],  label:'electronic pulse' },
  blues:       { hues:[210,225,240],          sat:[30,55],  lit:[20,45],  label:'deep blues' },
  // architecture
  bauhaus:     { hues:[0,60,240],             sat:[60,90],  lit:[40,65],  label:'bauhaus primary' },
  gothic:      { hues:[270,285,300,0],        sat:[30,60],  lit:[8,28],   label:'gothic dark' },
  baroque:     { hues:[38,48,58,270],         sat:[45,75],  lit:[30,55],  label:'baroque opulence' },
  modernist:   { hues:[200,215,0,5],          sat:[5,20],   lit:[55,80],  label:'modernist clean' },
  // time of day
  dawn:        { hues:[20,35,280,295],        sat:[40,70],  lit:[65,82],  label:'dawn pink' },
  dusk:        { hues:[15,30,255,270],        sat:[45,75],  lit:[35,60],  label:'dusk purple' },
  noon:        { hues:[45,55,190,200],        sat:[50,80],  lit:[65,82],  label:'midday bright' },
  midnight:    { hues:[230,245,260],          sat:[25,50],  lit:[5,20],   label:'deep midnight' },
  // weather
  overcast:    { hues:[205,218,230],          sat:[5,18],   lit:[55,75],  label:'overcast grey' },
  thunder:     { hues:[240,255,270],          sat:[20,45],  lit:[10,30],  label:'thunderstorm' },
  heatwave:    { hues:[15,28,42],             sat:[70,95],  lit:[50,70],  label:'heatwave orange' },
  blizzard:    { hues:[200,212,225],          sat:[5,18],   lit:[80,95],  label:'blizzard white' },
};


const FONT_PAIRS = [
  { heading:'Playfair Display', body:'Source Serif 4' },
  { heading:'Space Grotesk',    body:'DM Sans' },
  { heading:'Bebas Neue',       body:'IBM Plex Mono' },
  { heading:'Cormorant Garamond', body:'Lato' },
  { heading:'Syne',             body:'Inter' },
  { heading:'DM Serif Display', body:'DM Mono' },
  { heading:'Oswald',           body:'Source Sans 3' },
  { heading:'Libre Baskerville',body:'Nunito' },
  { heading:'Archivo Black',    body:'Roboto' },
  { heading:'Raleway',          body:'Merriweather' },
];

const LAYOUTS   = ['strict grid','free flow','modular blocks','editorial columns','asymmetric','centered minimal'];
const DENSITIES = ['sparse','balanced','dense'];
const RADII     = ['0px','2px','4px','8px','16px'];

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function hslToHex(h,s,l){
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; const c=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function parseConcept(text){
  const words = text.toLowerCase().split(/[\s,\/\-]+/).filter(Boolean);
  const matched=[]; const unmatched=[]; const pools=[];
  words.forEach(w=>{
    const key = Object.keys(COLOR_MAP).find(k=>w.includes(k)||k.includes(w));
    if(key){ if(!matched.includes(key)){ matched.push(key); pools.push(COLOR_MAP[key]); } }
    else unmatched.push(w);
  });
  if(pools.length===0) pools.push(pick(Object.values(COLOR_MAP)));
  return {matched,unmatched,pools};
}

function generatePalette(pools){
  const pool = pick(pools);
  const colors=[];
  const used=new Set();
  for(let i=0;i<5;i++){
    let h,s,l,hex,tries=0;
    do {
      h=pick(pool.hues)+rand(-8,8);
      s=rand(pool.sat[0],pool.sat[1]);
      l=rand(pool.lit[0],pool.lit[1]);
      hex=hslToHex(h,s,l);
      tries++;
    } while(used.has(hex)&&tries<20);
    used.add(hex);
    colors.push({h,s,l,hex});
  }
  colors.sort((a,b)=>a.l-b.l);
  return {
    bg:        colors[4].hex,
    surface:   colors[3].hex,
    highlight: colors[2].hex,
    accent:    colors[1].hex,
    text:      colors[0].hex,
    fontPair:  pick(FONT_PAIRS),
    layout:    pick(LAYOUTS),
    density:   pick(DENSITIES),
    radius:    pick(RADII),
    label:     pool.label,
  };
}

function buildCard(palette, concept, idx, pools){
  const {bg,surface,accent,highlight,text,fontPair,layout,density,radius,label}=palette;
  const cssLines = [
    ['--color-bg',        bg],
    ['--color-surface',   surface],
    ['--color-accent',    accent],
    ['--color-highlight', highlight],
    ['--color-text',      text],
    ['--font-heading',    `'${fontPair.heading}', serif`],
    ['--font-body',       `'${fontPair.body}', sans-serif`],
    ['--spacing-unit',    '8px'],
    ['--border-radius',   radius],
  ].map(([k,v])=>`<span class="ck">${k}:</span> <span class="cv">${v};</span>`).join('\n');

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-preview">
      <div class="preview-main" style="background:${bg};">
        <span style="font-size:15px;font-weight:500;color:${text};text-align:center;line-height:1.4;">${label}</span>
      </div>
      <div class="preview-top" style="background:${surface};"></div>
      <div class="preview-bot" style="background:${accent};">
        ${[bg,surface,accent,highlight,text].map(c=>`<div class="swatch" style="background:${c};"></div>`).join('')}
      </div>
    </div>
    <div class="card-body">
      <div class="card-header">
        <div class="card-tag">Variant ${idx} — ${concept}</div>
        <button class="reroll">Reroll ↺</button>
      </div>
      <div class="swatches-row">
        ${[bg,surface,accent,highlight,text].map(c=>`<div class="dot" style="background:${c};" title="${c}"></div>`).join('')}
      </div>
      <div class="meta-row">
        <span>${fontPair.heading} / ${fontPair.body}</span>
        <span>${layout} · ${density}</span>
      </div>
      <div class="css-block">${cssLines}</div>
    </div>
  `;

  card.querySelector('.reroll').addEventListener('click',()=>{
    const np = generatePalette(pools);
    card.replaceWith(buildCard(np, concept, idx, pools));
  });

  return card;
}

function run(){
  const concept = document.getElementById('concept').value.trim();
  if(!concept) return;

  const {matched,unmatched,pools} = parseConcept(concept);

  const tagsEl = document.getElementById('tags');
  tagsEl.innerHTML = '';
  matched.forEach(w=>{
    const p = COLOR_MAP[w];
    const bg = hslToHex(pick(p.hues), rand(p.sat[0],p.sat[1]), rand(35,55));
    const t = document.createElement('span');
    t.className='tag matched';
    t.style.background=bg;
    t.textContent=`${w} → ${p.label}`;
    tagsEl.appendChild(t);
  });
  unmatched.forEach(w=>{
    const t=document.createElement('span');
    t.className='tag';
    t.textContent=`${w} (unrecognized)`;
    tagsEl.appendChild(t);
  });

  const out = document.getElementById('output');
  out.innerHTML = '<div class="cards-grid" id="grid"></div>';
  const grid = document.getElementById('grid');

  for(let i=0;i<4;i++){
    grid.appendChild(buildCard(generatePalette(pools), concept, i+1, pools));
  }
}

document.getElementById('runBtn').addEventListener('click', run);
document.getElementById('concept').addEventListener('keydown', e=>{
  if(e.key==='Enter'&&e.metaKey) run();
});

// Populate keywords list
const kwList = document.getElementById('kwList');
kwList.innerHTML = Object.keys(COLOR_MAP).join('<br>');
</script>
